<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>扫雷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d3436;font-family:'Arial',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:500px;margin-bottom:8px;color:#fff}
.title{font-size:32px;font-weight:bold;color:#dfe6e9}
.info{display:flex;gap:12px;font-size:14px}
.info span{background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:12px}
.controls{display:flex;gap:10px;margin-bottom:10px;align-items:center;width:100%;max-width:500px}
.btn{background:#636e72;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:14px;cursor:pointer}
.btn:hover{background:#b2bec3;color:#2d3436}
.select{padding:6px;border-radius:4px;font-size:13px}
.board{display:inline-grid;gap:1px;background:#636e72;padding:2px;border-radius:4px}
.cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;cursor:pointer;user-select:none;transition:background .1s}
.cell.hidden{background:#b2bec3}
.cell.hidden:hover{background:#dfe6e9}
.cell.revealed{background:#dfe6e9}
.cell.mine{background:#d63031}
.cell.flagged{background:#fdcb6e}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10}
.overlay.show{display:flex}
.overlay h2{font-size:36px;color:#fff;margin-bottom:10px}
.overlay p{font-size:18px;color:#eee;margin-bottom:20px}
.overlay .btn{width:200px;font-size:18px;padding:12px}
</style>
</head>
<body>
<div class="header">
  <div class="title">扫雷</div>
  <div class="info">
    <span>💣 <b id="mines">10</b></span>
    <span>⏱ <b id="timer">0</b>s</span>
  </div>
</div>
<div class="controls">
  <select class="select" id="difficulty" onchange="newGame()">
    <option value="easy">初级 9×9</option>
    <option value="medium">中级 16×16</option>
    <option value="hard">高级 16×30</option>
  </select>
  <button class="btn" onclick="newGame()">新游戏</button>
</div>
<div class="board" id="board"></div>
<div class="overlay" id="overlay">
  <h2 id="msg"></h2>
  <p id="subMsg"></p>
  <button class="btn" onclick="newGame()">再来一局</button>
</div>

<script>
const LEVELS={easy:{r:9,c:9,m:10},medium:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let rows,cols,mineCount,grid,revealed,flagged,gameOver,firstClick,timerId,seconds;

function newGame(){
  const lvl=LEVELS[document.getElementById('difficulty').value];
  rows=lvl.r;cols=lvl.c;mineCount=lvl.m;
  grid=Array(rows).fill(null).map(()=>Array(cols).fill(0));
  revealed=Array(rows).fill(null).map(()=>Array(cols).fill(false));
  flagged=Array(rows).fill(null).map(()=>Array(cols).fill(false));
  gameOver=false;firstClick=true;seconds=0;
  clearInterval(timerId);timerId=null;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('timer').textContent='0';
  document.getElementById('mines').textContent=mineCount;
  render();
}

function placeMines(sr,sc){
  let placed=0;
  while(placed<mineCount){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(grid[r][c]===-1||Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
    grid[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(grid[r][c]===-1)continue;
    let cnt=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]===-1)cnt++;
    }
    grid[r][c]=cnt;
  }
}

function render(){
  const board=document.getElementById('board');
  board.style.gridTemplateColumns=`repeat(${cols},30px)`;
  board.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const div=document.createElement('div');
    div.className='cell';
    if(revealed[r][c]){
      if(grid[r][c]===-1){div.classList.add('mine');div.textContent='💣';}
      else{
        div.classList.add('revealed');
        if(grid[r][c]>0){
          div.textContent=grid[r][c];
          const colors=['','#0984e3','#00b894','#d63031','#6c5ce7','#e17055','#00cec9','#fdcb6e','#636e72'];
          div.style.color=colors[grid[r][c]]||'#333';
        }
      }
    }else{
      div.classList.add('hidden');
      if(flagged[r][c])div.textContent='🚩';
    }
    div.onmousedown=e=>cellClick(e,r,c);
    div.oncontextmenu=e=>e.preventDefault();
    board.appendChild(div);
  }
}

function cellClick(e,r,c){
  if(gameOver)return;
  if(e.button===2){
    if(!revealed[r][c]){flagged[r][c]=!flagged[r][c];render();updateMines();}
    return;
  }
  if(flagged[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);startTimer();}
  if(grid[r][c]===-1){
    gameOver=true;clearInterval(timerId);
    revealAll();
    setTimeout(()=>{document.getElementById('msg').textContent='💥 游戏结束！';document.getElementById('subMsg').textContent='用时：'+seconds+'秒';document.getElementById('overlay').classList.add('show');},200);
    return;
  }
  reveal(r,c);render();
  checkWin();
}

function reveal(r,c){
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(grid[r][c]===0){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);}
}

function revealAll(){
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)revealed[r][c]=true;
  render();
}

function checkWin(){
  let unrevealed=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c])unrevealed++;
  if(unrevealed===mineCount){
    gameOver=true;clearInterval(timerId);
    setTimeout(()=>{document.getElementById('msg').textContent='🎉 恭喜通关！';document.getElementById('subMsg').textContent='用时：'+seconds+'秒';document.getElementById('overlay').classList.add('show');},200);
  }
}

function updateMines(){
  let cnt=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(flagged[r][c])cnt++;
  document.getElementById('mines').textContent=mineCount-cnt;
}

function startTimer(){
  timerId=setInterval(()=>{seconds++;document.getElementById('timer').textContent=seconds;},1000);
}

newGame();
</script>
</body>
</html>
