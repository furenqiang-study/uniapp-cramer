<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8ef;font-family:'Arial',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:400px;margin-bottom:10px}
.title{font-size:48px;font-weight:bold;color:#776e65}
.scores{display:flex;gap:10px}
.score-box{background:#bbada0;color:#fff;padding:8px 16px;border-radius:6px;text-align:center}
.score-box .label{font-size:12px;text-transform:uppercase}
.score-box .value{font-size:20px;font-weight:bold}
.controls{display:flex;gap:10px;margin-bottom:10px;width:100%;max-width:400px}
.btn{background:#8f7a66;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:16px;cursor:pointer;flex:1}
.btn:hover{background:#9f8b77}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#bbada0;padding:8px;border-radius:8px;width:100%;max-width:400px;aspect-ratio:1}
.cell{border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;transition:all .1s}
.cell-0{background:#cdc1b4}
.cell-2{background:#eee4da;color:#776e65}
.cell-4{background:#ede0c8;color:#776e65}
.cell-8{background:#f2b179;color:#fff}
.cell-16{background:#f59563;color:#fff}
.cell-32{background:#f67c5f;color:#fff}
.cell-64{background:#f65e3b;color:#fff}
.cell-128{background:#edcf72;color:#fff;font-size:20px}
.cell-256{background:#edcc61;color:#fff;font-size:20px}
.cell-512{background:#edc850;color:#fff;font-size:18px}
.cell-1024{background:#edc53f;color:#fff;font-size:16px}
.cell-2048{background:#edc22e;color:#fff;font-size:16px}
.cell-super{background:#3c3a32;color:#fff;font-size:14px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(238,228,218,0.73);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10}
.overlay.show{display:flex}
.overlay h2{font-size:48px;color:#776e65;margin-bottom:20px}
.overlay .btn{width:200px}
</style>
</head>
<body>
<div class="header">
  <div class="title">2048</div>
  <div class="scores">
    <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="newGame()">新游戏</button>
</div>
<div class="board" id="board"></div>
<div class="overlay" id="overlay">
  <h2 id="overlayMsg"></h2>
  <button class="btn" onclick="newGame()">再来一局</button>
</div>

<script>
let grid,score,best=parseInt(localStorage.getItem('best2048')||'0'),won;
const board=document.getElementById('board'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),overlay=document.getElementById('overlay'),overlayMsg=document.getElementById('overlayMsg');
bestEl.textContent=best;

function newGame(){
  grid=Array(4).fill(null).map(()=>Array(4).fill(0));
  score=0;won=false;
  overlay.classList.remove('show');
  addRandom();addRandom();render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
}

function render(){
  board.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c],div=document.createElement('div');
    const cls=v<=2048?'cell-'+v:'cell-super';
    div.className='cell '+cls;
    div.textContent=v||'';
    board.appendChild(div);
  }
  scoreEl.textContent=score;
  if(score>best){best=score;localStorage.setItem('best2048',best);bestEl.textContent=best;}
}

function slide(row){
  let a=row.filter(v=>v),merged=false;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);merged=true;if(a[i]===2048&&!won){won=true;}}
  }
  while(a.length<4)a.push(0);
  return a;
}

function move(dir){
  let moved=false,old=JSON.stringify(grid);
  if(dir==='left'){for(let r=0;r<4;r++){grid[r]=slide(grid[r]);}}
  else if(dir==='right'){for(let r=0;r<4;r++){grid[r]=slide(grid[r].reverse()).reverse();}}
  else if(dir==='up'){for(let c=0;c<4;c++){let col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];col=slide(col);for(let r=0;r<4;r++)grid[r][c]=col[r];}}
  else if(dir==='down'){for(let c=0;c<4;c++){let col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];col=slide(col);for(let r=0;r<4;r++)grid[r][c]=col[3-r];}}
  if(JSON.stringify(grid)!==old){moved=true;addRandom();render();}
  if(won){setTimeout(()=>{overlayMsg.textContent='🎉 你赢了！';overlay.classList.add('show');},300);return;}
  if(!canMove()){setTimeout(()=>{overlayMsg.textContent='游戏结束！得分：'+score;overlay.classList.add('show');},300);}
}

function canMove(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return true;
    if(c<3&&grid[r][c]===grid[r][c+1])return true;
    if(r<3&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});

let tx,ty;
board.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
board.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}else{move(dy>0?'down':'up');}
});

newGame();
</script>
</body>
</html>
